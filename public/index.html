<!DOCTYPE html>
<html lang="en-NZ">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Availability | Living Culture</title>
  <style>
    :root {
      --green: #285c4b;
      --green-dark: #163b31;
      --mint: #e5f1eb;
      --teal: #08788b;
      --yellow: #f4b340;
      --yellow-soft: #fff1d7;
      --red: #b54837;
      --ink: #1d2d28;
      --muted: #64786f;
      --paper: #ffffff;
      --surface: #f4f6f3;
      --line: #d8e1db;
      --shadow: 0 16px 36px rgba(22, 48, 40, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--surface);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--paper);
    }

    .topbar {
      background: var(--green);
      color: #fff;
      padding: 22px 20px 20px;
    }

    .topbar__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .logo {
      width: 126px;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      line-height: 1.1;
      text-align: right;
    }

    .content {
      padding: 18px 16px 36px;
    }

    .tools {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: var(--paper);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .sku-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 70px 44px;
      gap: 8px;
      margin-bottom: 10px;
      align-items: start;
    }

    .sku-search {
      position: relative;
    }

    input {
      width: 100%;
      height: 46px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
    }

    input:focus {
      border-color: var(--green);
      outline: 2px solid rgba(40, 92, 75, 0.16);
    }

    .qty {
      text-align: center;
    }

    .icon-button,
    .secondary-button,
    .scan-button,
    .lookup-button,
    .close-button {
      height: 46px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--green-dark);
      font-weight: 600;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 44px;
      font-size: 1.25rem;
    }

    .icon-button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0 10px;
    }

    .scan-button,
    .lookup-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .lookup-button {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .lookup-button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .secondary-button {
      width: 100%;
      color: var(--green);
    }

    .sku-product-suggestions {
      position: absolute;
      inset: calc(100% + 4px) 0 auto;
      display: none;
      z-index: 10;
      max-height: 250px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .sku-product-suggestions.is-visible {
      display: block;
    }

    .sku-product-option {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .sku-product-option:last-child { border-bottom: 0; }
    .sku-product-option:hover { background: var(--mint); }

    .sku-product-option img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      flex: 0 0 44px;
    }

    .sku-product-option strong,
    .sku-product-option span {
      display: block;
      font-size: 0.9rem;
    }

    .sku-product-option span {
      color: var(--muted);
      margin-top: 4px;
    }

    .sku-product-empty {
      padding: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #status {
      min-height: 22px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    #status.error { color: var(--red); }

    .results {
      display: grid;
      gap: 10px;
    }

    .product-card {
      position: relative;
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      overflow: hidden;
    }

    .product-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: #39ae7e;
    }

    .product-card.presale::before { background: var(--yellow); }
    .product-card.unavailable::before { background: var(--red); }

    .product-image {
      width: 78px;
      height: 78px;
      object-fit: contain;
    }

    .product-sku {
      color: var(--teal);
      font-size: 0.88rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .product-name {
      margin: 0 0 10px;
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .availability {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 9px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--mint);
      color: var(--green);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .pill.presale {
      color: #865700;
      background: var(--yellow-soft);
    }

    .pill.pending {
      color: var(--muted);
      background: #eef2f2;
    }

    .pill.unavailable {
      color: var(--red);
      background: #f8e7e4;
    }

    .product-link {
      color: var(--green);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .stock {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .stock-title {
      margin-bottom: 8px;
      color: var(--green);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .stock-columns,
    .stock-row {
      display: grid;
      grid-template-columns: minmax(72px, 1fr) repeat(4, 47px);
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
    }

    .stock-columns {
      margin-bottom: 5px;
      color: var(--muted);
    }

    .stock-columns span:not(:first-child),
    .stock-row span {
      text-align: right;
    }

    .stock-row {
      padding: 7px 0;
      border-top: 1px solid #edf2ef;
      color: var(--muted);
    }

    .stock-row strong {
      overflow-wrap: anywhere;
      color: var(--text);
      font-weight: 600;
    }

    .stock-positive {
      color: var(--green);
      font-weight: 700;
    }

    .stock-message {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .stock-message.error {
      color: var(--red);
    }

    .scanner-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: end;
      justify-content: center;
      padding: 16px;
      background: rgba(16, 32, 27, 0.52);
      z-index: 50;
    }

    .scanner-backdrop.open { display: flex; }

    .scanner {
      width: min(500px, 100%);
      border-radius: 8px;
      background: #fff;
      padding: 16px;
    }

    .scanner__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .scanner__head h2 {
      font-size: 1.1rem;
      margin: 0;
    }

    .close-button {
      width: 42px;
      font-size: 1.3rem;
    }

    #reader {
      min-height: 250px;
      overflow: hidden;
      border-radius: 8px;
      background: #101a17;
    }

    .scanner p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (min-width: 700px) {
      .topbar { border-radius: 0 0 8px 8px; }
      .content { padding: 24px 20px 42px; }
      .results { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="topbar__row">
        <img class="logo" src="https://livingculture.co.nz/cdn/shop/files/logo_ec2b0c5e-42ca-4695-8c7e-43b344144c58.png?v=1675047511&width=300" alt="Living Culture" />
        <h1>Product<br>Availability</h1>
      </div>
    </header>

    <section class="content">
      <section class="tools" aria-label="Product availability search">
        <h2 class="section-title">Products</h2>
        <div id="skuList">
          <div class="sku-row">
            <div class="sku-search">
              <input class="sku-input" type="search" autocomplete="off" placeholder="Enter SKU or scan code" aria-label="Product SKU" />
              <div class="sku-product-suggestions"></div>
            </div>
            <input class="qty" type="number" min="1" step="1" value="1" aria-label="Quantity" />
            <button class="icon-button remove" type="button" aria-label="Remove product" title="Remove product" disabled>&times;</button>
          </div>
        </div>
        <button id="addSku" class="secondary-button" type="button">Add product</button>
        <div class="actions">
          <button id="scan" class="scan-button" type="button" title="Scan a QR code or barcode">Scan code</button>
          <button id="check" class="lookup-button" type="button">Check availability</button>
        </div>
        <div id="status" aria-live="polite"></div>
      </section>

      <section id="results" class="results" aria-live="polite"></section>
    </section>
  </main>

  <div id="scannerBackdrop" class="scanner-backdrop" role="dialog" aria-modal="true" aria-labelledby="scannerTitle">
    <div class="scanner">
      <div class="scanner__head">
        <h2 id="scannerTitle">Scan product code</h2>
        <button id="closeScanner" class="close-button" type="button" aria-label="Close scanner">&times;</button>
      </div>
      <div id="reader"></div>
      <p>Point the camera at a QR code or barcode. The scanned SKU is entered automatically.</p>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
