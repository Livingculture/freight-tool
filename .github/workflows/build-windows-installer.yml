name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows-installer.yml"
      - ".gitignore"
      - "main.js"
      - "package.json"
      - "package-lock.json"
      - "preload.js"
      - "server.js"
      - "renderer/**"
      - "public/**"
      - "scripts/**"

jobs:
  windows-installer:
    name: Windows installer with Chromium
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer with bundled Playwright Chromium
        run: npm run package:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: living-culture-freight-windows-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 30
